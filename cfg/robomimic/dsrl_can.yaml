defaults:
  - _self_
hydra:
  run:  
    dir: ${logdir}

name: robomimic_can_dsrl_${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
logdir: ${log_dir}/robomimic-dsrl/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
base_policy_path: ./dppo/log/robomimic-pretrain/can/can_pre_diffusion_mlp_ta4_td20/2024-06-28_13-29-54/checkpoint/state_5000.pt
offline_data_path: ./dppo/log/robomimic/can_test/train_offline.npz
dppo_path: ./dppo
normalization_path: ./dppo/log/robomimic/${env_name}/normalization.npz

algorithm: dsrl_na # options are: dsrl_na, dsrl_sac

seed: 1
device: cuda:0
use_wandb: True
env_name: can
log_dir: ./logs 
obs_dim: 23
action_dim: 7
cond_steps: 1
act_steps: 4 # action chunk size / diffusion horizon of the base policy
load_offline_data: False # if true, load offline demonstration data into replay buffer
deterministic_eval: False # if true, run eval with both deterministic actions, as well as stochastic

eval_interval: 3000
num_evals: 200
# false: 不保存训练中途 ft_policy_* 与结束时的 final
save_checkpoint: False
save_model_interval: 999999999
save_replay_buffer: False

env:
  n_envs:  4
  n_eval_envs: 25
  name: ${env_name}
  max_episode_steps: 300
  reset_at_iteration: False
  save_video: False
  eval_video_fps: 20
  eval_video_max_frames: 300
  eval_video_freq: 1
  best_reward_threshold_for_success: 1 
  reward_offset: 1
  wrappers:
    robomimic_lowdim:
      normalization_path: ${normalization_path}
      low_dim_keys: ['robot0_eef_pos',
                    'robot0_eef_quat',
                    'robot0_gripper_qpos',
                    'object'] # same order of preprocessed observations
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${act_steps}
      max_episode_steps: ${env.max_episode_steps}
      reset_within_step: True

wandb:
  project: dsrl
  run: ${now:%H-%M-%S}_${name}
  group: robomimic-can

train:
  tau: 0.005 # Target update rate
  actor_lr: 3e-4
  batch_size: 256
  train_freq: 1 # Update model after this many environment steps
  utd: 30  # gradient steps per env step (UTD ratio)
  noise_critic_grad_steps: 10 # Number of gradient steps to take per update when fitting noise critic 
  use_layer_norm: True
  layer_size: 2048 # Layer size for actor and critic
  num_layers: 3 # Number of layers for actor and critic
  discount: 0.99
  ent_coef: -1
  target_ent: 0.0
  init_rollout_steps: 24000 # Number of rollout steps of standard diffusion policy to collect for replay buffer before training starts
  action_magnitude: 1.5 # Maximum action magnitude in noise action space
  n_critics: 2 # Number of critic Q networks
  critic_backup_combine_type: min
  # Budget-strong elastic three-head scheduling
  enable_three_head: True
  schedule_heads_after: 0
  min_denoising_steps: 3
  max_denoising_steps: 8
  min_chunk_size: 1
  # For CAN, executed chunk size cannot exceed act_steps unless the base diffusion horizon is retrained larger.
  max_chunk_size: ${act_steps}
  fixed_denoising_steps: 8
  fixed_chunk_size: ${act_steps}
  step_cost: 0.01
  target_nfe: 1.75
  actor_compute_lambda: 0.45
  actor_compute_lambda_warmup: 0.15
  cost_gate_mode: step_monotonic
  cost_start_step: 10000
  cost_warmup_steps: 90000
  cost_open_rate: 0.05
  cost_close_rate: 1.0
  cost_no_rollback: True
  # FV scale note: with horizon-4 and chunk elasticity off, NFE ~= denoising_steps / 4.
  # target_nfe=1.75 therefore asks for about 7 denoising steps on average.
  # One transition also sums 4 low-level robomimic rewards, so rollout_reward lambda is larger than actor_loss lambda.
  # Episode-level reward shaping uses the requested chunk selected by the scheduler.
  budget_penalty_location: rollout_reward
  nfe_budget_mode: episode_band
  nfe_debt_limit: 4.0
  nfe_budget_penalty_scale: 10.0
  nfe_target_lower: 1.55
  nfe_target_upper: 2.05
  nfe_under_weight: 0.15
  nfe_saving_weight: 0.06
  episode_success_threshold: -0.5
  # True chunk elasticity replans after the executed prefix of the horizon-4 action sequence.
  enable_chunk_elasticity: True
  stochastic_rounding: False
  range_alpha_mode: step_success
  range_actuator_floor: 0.35
  range_success_thresh_1: 0.45
  range_success_thresh_2: 0.65
  range_open_rate: 0.10
  range_close_rate: 0.04
  range_success_no_close: True
  schedule_control_mode: prior_residual
  schedule_warmup_steps: 60000
  schedule_gate_floor: 0.3
  preprior_residual_scale: 0.75
  schedule_residual_scale: 0.30
  schedule_entropy_weight: 0.0
  difficulty_prior_start_step: 35000
  difficulty_prior_warmup_steps: 50000
  difficulty_prior_scale: 0.75
  difficulty_prior_deadband: 0.03
  difficulty_prior_signal_mode: compute_advantage
  difficulty_prior_signal_scale: 1.0
  difficulty_prior_gate_floor: 0.0
  difficulty_weight: 0.04
  difficulty_loss_mode: elastic_margin_hinge
  difficulty_signal_mode: compute_advantage
  difficulty_signal_scale: 0.75
  difficulty_start_step: 40000
  difficulty_warmup_steps: 50000
  difficulty_margin_target: 0.35
  difficulty_margin_gate_floor: 0.0
  difficulty_margin_start_step: 40000
  difficulty_margin_warmup_steps: 50000
  difficulty_mode_margin_weight: 0.30
  difficulty_quantile_hinge_weight: 0.0
  difficulty_hard_steps_target: 8
  difficulty_hard_chunk_target: 1
  difficulty_easy_steps_target: 4
  difficulty_easy_chunk_target: ${act_steps}
  difficulty_gate_mode: success
  difficulty_success_thresh_1: 0.50
  difficulty_success_thresh_2: 0.70
  eval_success_ema_beta: 0.8
  range_success_ema_beta: 0.8
  difficulty_success_ema_beta: 0.8
  difficulty_success_open_rate: 0.10
  difficulty_success_close_rate: 0.04
  difficulty_success_no_close: True

model:
  _target_: model.diffusion.diffusion_eval.DiffusionEval
  ft_denoising_steps: 0
  predict_epsilon: True
  denoised_clip_value: 1.0
  randn_clip_value: 3
  network_path: ${base_policy_path}
  network:
    _target_: model.diffusion.mlp_diffusion.DiffusionMLP
    time_dim: 16
    mlp_dims: [512, 512, 512]
    residual_style: True
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    horizon_steps: ${act_steps}
    action_dim: ${action_dim}
  horizon_steps: ${act_steps}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  denoising_steps: 20
  device: ${device}
  use_ddim: True
  ddim_steps: 8
  controllable_noise: True
